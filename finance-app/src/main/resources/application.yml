server:
  port: 18080
  servlet:
    context-path: /api

spring:
  application:
    name: finance-app
  profiles:
    active: dev
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://103.236.96.82:13306/finance_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: remote
    password: ToCAt69Aidc16I1KvkQo2YWMlUl01U0o
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.finance.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-prefix: ""

# JWT 配置
jwt:
  secret: finance-app-jwt-secret-key-2026-please-replace-in-production
  expire: 86400  # 单位：秒，24小时
  header: Authorization
  prefix: "Bearer "

# 文件上传路径
file:
  upload-path: ./data/files/
  access-prefix: /api/file/

# 日志配置
logging:
  level:
    com.finance: debug
    com.baomidou.mybatisplus: warn
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: false
    enable-swagger-models: true
    swagger-model-name: 实体类列表
